<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Lotto - 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Vibe Lotto</h1>
            <button id="theme-toggle" aria-label="테마 변경">
                <span class="icon">☀️</span>
            </button>
        </header>

        <main>
            <div id="lotto-display" class="lotto-container">
                <div class="ball-placeholder">?</div>
                <div class="ball-placeholder">?</div>
                <div class="ball-placeholder">?</div>
                <div class="ball-placeholder">?</div>
                <div class="ball-placeholder">?</div>
                <div class="ball-placeholder">?</div>
            </div>

            <button id="generate-btn" class="primary-btn">번호 생성하기</button>

            <section class="partnership-section">
                <h2>제휴 문의</h2>
                <form action="https://formspree.io/f/xnjgdyqq" method="POST" class="inquiry-form">
                    <div class="form-group">
                        <label for="name">성함/업체명</label>
                        <input type="text" id="name" name="name" placeholder="성함 또는 업체명을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" placeholder="답변받으실 이메일을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해 주세요" required></textarea>
                    </div>
                    <button type="submit" class="secondary-btn">문의 보내기</button>
                </form>
            </section>

            <section class="comments-section">
                <h2>댓글</h2>
                <div id="disqus_thread"></div>
                <script>
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://test-drkbqnpykf.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 VibeCoding. 행운을 빕니다!</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
